  </g>
  <g filter="url(#blurB)">
    <circle cx="124" cy="568" r="62" fill="#F1A85B" fill-opacity="0.28"/>
  </g>

  <rect x="76" y="72" width="1128" height="576" rx="30" fill="url(#card)" stroke="#28445F"/>

